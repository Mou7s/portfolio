title: Infinite Minesweeper (Nuxt + Cloudflare)
description: Built an infinite multiplayer Minesweeper game with Nuxt 4, Canvas, and WebSocket. The board expands through coordinate-based mine generation, while Cloudflare Workers, Durable Object, and KV handle realtime sync, leaderboards, player state, and persistent online storage.
