faq:
  title: 常见问题解答
  description: 快速了解关于我的常见问题。
  categories:
    - title: 关于我是谁
      questions:
        - label: 用一句话概括你的定位？
          content: |
            我是一名擅长用代码与视觉设计将创意落地、确保系统高可用和优质用户体验的全栈工程师。
        - label: 你的职业背景是什么？
          content: |
            我的职业起步于企业 IT 运维与网络系统管理，这培养了我对底层基础设施稳定性与系统安全的严谨意识。此后我逐步转向全栈开发领域，把扎实的网络工程经验与前端美学设计相结合，从而能设计出既底层稳健又上层优雅、易用的数字产品。
    - title: 工作与服务
      questions:
        - label: 你平时主要做哪类项目？
          content: |
            我专注于企业官网及后台管理系统的全栈研发与部署交付。在技术开发之外，我也能提供高水准的平面视觉设计与视频宣传片剪辑服务，从软硬件组网到网站上线提供全流程的支持。
        - label: 你能提供哪些具体的服务？
          content: |
            包括不限于：企业级全栈 Web 开发（Vue/React/Nuxt）、定制化 ERP 模块研发与系统运维支持、企业办公局域网组网与异地 VPN 组网方案设计、平面视觉设计（画册/海报/包装）与多媒体视频拍摄剪辑。
    - title: 合作与联系
      questions:
        - label: 如何与你取得联系？
          content: |
            您可以通过我的 [GitHub 个人主页](https://github.com/mou7s) 了解我的开源项目和日常提交，也可以直接发送邮件到 [mou7s@icloud.com](mailto:mou7s@icloud.com)。非常期待与您的精彩合作！
