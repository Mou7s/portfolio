  title: "关于我"
  description: |
    作为拥有 3 年实践经验的全栈工程师，我负责网站的端到端开发与线上部署，全程护航项目从构思到最终上线。
    我同时熟练掌握平面设计与视频剪辑，能有力提升品牌及内容的视觉表达，并负责企业网络运营，确保系统的安全稳定与网站的流畅访问。
    通过将技术实现与视觉沟通有机结合，我致力于将复杂的业务需求转化为稳定、高品质且交互顺畅的数字产品。

