title: 大型年会 IT 技术支持与现场导播运营
description: 主导了公司约 800 人规模年会的全流程 IT 技术支持与现场音视频/灯光系统控制，负责舞台 AV 设备的搭建与调校、演讲幻灯片的设计与播放、现场灯光秀编程、背景音乐音效调度以及大屏幕实时导播。自主设计并运行了一套年会抽奖系统，实现了透明的大并发抽奖与大屏视觉动效展示。保障了整场活动的流畅安全运行，收获了广泛好评，并为后续大型企业活动沉淀了可复用的技术流程。
