title: 企业官网研发与部署 (Nuxt + i18n)
description: 基于 Nuxt 架构设计并上线了公司官方多语言网站，实现了移动优先的全响应式布局与极速加载性能优化。借助 Nuxt UI 打造精美界面，使用 Nuxt Content 结构化发布企业与产品信息；通过 PM2 进程守护以及 Caddy 自动申请 SSL 证书实现高可用 HTTPS 生产部署。利用 Google Search Console 和 Chrome Lighthouse 持续进行 SEO 调优，使目标核心关键词在 Google 搜索中名列前茅。
